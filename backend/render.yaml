# render.yaml — Render deployment configuration
# Deploy backend as a Web Service, frontend as a Static Site

services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: brewhaven-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure value
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false          # Set to your Vercel frontend URL
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Frontend Static Site ──────────────────────────────────────
  - type: web
    name: brewhaven-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to https://brewhaven-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html  # SPA fallback for React Router
